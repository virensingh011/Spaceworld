<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpaceXplore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div>

<header>
  <h1> SpaceXplore</h1>
  <p>Live Space + AI Dashboard</p>
</header>

<section class="card">
  <h2>🛰️ ISS Current Location</h2>
  <p id="iss">Loading...</p>
</section>

<section class="card">
  <h2>🌌 Space News</h2>
  <ul id="news"></ul>
</section>

<section class="card">
  <h2>🌍 Weather</h2>
  <input type="text" id="city" placeholder="Enter city">
  <button onclick="getWeather()">Get Weather</button>
  <p id="weather"></p>
</section>

<section class="card">
  <h2>🤖 AI Space Assistant</h2>
  <input type="text" id="prompt" placeholder="Ask about space...">
  <button onclick="askAI()">Ask</button>
  <p id="aiResponse"></p>
</section>

<script src="script.js"></script>
</body>
</html>
